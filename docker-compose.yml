services:
  postgres:
    image: postgres:17
    container_name: dms-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dms-network

  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: dms-rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - dms-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: dms-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -s http://localhost:9200/_cluster/health | grep -vq ''"status":"red"''',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - dms-network

  kibana:
    image: docker.elastic.co/kibana/kibana:9.0.0
    container_name: dms-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - dms-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dms-backend
    volumes:
      - .:/app
      - m2-cache:/root/.m2
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - dms-network

  processor:
    build:
      context: ../document-management-processor
      dockerfile: Dockerfile
    image: document-management-processor
    container_name: dms-processor
    ports:
      - "8000:8000"
    volumes:
      - ../document-management-processor:/app
      - hf-cache:/cache/huggingface
      - easyocr-cache:/root/.EasyOCR
      - pip-cache:/root/.cache/pip
      - mlflow-data:/mlflow
    env_file:
      - ../document-management-processor/.env
    gpus: all
    networks:
      - dms-network

  worker:
    image: document-management-processor
    container_name: dms-worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    ports:
      - "8001:8001"
    volumes:
      - ../document-management-processor:/app
      - hf-cache:/cache/huggingface
      - easyocr-cache:/root/.EasyOCR
      - pip-cache:/root/.cache/pip
      - mlflow-data:/mlflow:ro
    env_file:
      - ../document-management-processor/.env
    gpus: all
    networks:
      - dms-network

  register:
    image: document-management-processor
    container_name: dms-register
    command: ["python", "-m", "scripts.register_model"]
    volumes:
      - ../document-management-processor:/app
      - mlflow-data:/mlflow
    env_file:
      - ../document-management-processor/.env
    networks:
      - dms-network
    profiles:
      - tools

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: dms-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - dms-network

  grafana:
    image: grafana/grafana:11.6.0
    container_name: dms-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - dms-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: dms-mlflow
    ports:
      - "5001:5001"
    command:
      [
        "mlflow",
        "server",
        "--host",
        "0.0.0.0",
        "--port",
        "5001",
        "--allowed-hosts",
        "localhost,localhost:5001,127.0.0.1,127.0.0.1:5001,mlflow,mlflow:5001,host.docker.internal",
        "--backend-store-uri",
        "sqlite:///mlflow/mlflow.db",
        "--default-artifact-root",
        "/mlflow/artifacts",
      ]
    volumes:
      - mlflow-data:/mlflow
    networks:
      - dms-network

volumes:
  postgres-data:
  rabbitmq-data:
  elasticsearch-data:
  m2-cache:
  hf-cache:
  easyocr-cache:
  pip-cache:
  prometheus-data:
  grafana-data:
  mlflow-data:

networks:
  dms-network:
