services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: dms-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dms-network

  springboot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dms-app
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - python-app
    env_file:
      - .env
    networks:
      - dms-network

  python-app:
    build:
      context: ../dms-semantic-service
      dockerfile: Dockerfile
    container_name: dms-python-app
    ports:
      - "8000:8000"
    networks:
      - dms-network

volumes:
  postgres-data:

networks:
  dms-network:
