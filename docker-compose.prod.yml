services:
  postgres:
    image: postgres:17
    container_name: dms-postgres
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: dms-rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - dms-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: dms-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -s http://localhost:9200/_cluster/health | grep -vq ''"status":"red"''',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - dms-network

  kibana:
    image: docker.elastic.co/kibana/kibana:9.0.0
    container_name: dms-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - dms-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: dms-backend:latest
    container_name: dms-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      processor:
        condition: service_started
    networks:
      - dms-network

  # frontend:
  #   build:
  #     context: ../document-management-fe
  #     dockerfile: Dockerfile.prod
  #     args:
  #       - VITE_GOOGLE_CLIENT_ID
  #       - VITE_CHECK_ACCESS
  #       - VITE_API_BASE_URL
  #   image: dms-frontend:latest
  #   container_name: dms-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   env_file:
  #     - .env
  #   networks:
  #     - dms-network

  processor:
    build:
      context: ../document-management-processor
      dockerfile: Dockerfile.prod
    image: dms-processor:latest
    container_name: dms-processor
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - hf-cache:/cache/huggingface
      - easyocr-cache:/root/.EasyOCR
      - mlflow-data:/mlflow
    env_file:
      - ../document-management-processor/.env
    depends_on:
      elasticsearch:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - dms-network

  worker:
    image: dms-processor:latest
    container_name: dms-worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    ports:
      - "8001:8001"
    volumes:
      - hf-cache:/cache/huggingface
      - easyocr-cache:/root/.EasyOCR
      - mlflow-data:/mlflow:ro
    env_file:
      - ../document-management-processor/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - dms-network

  register:
    image: dms-processor:latest
    container_name: dms-register
    command: ["python", "-m", "scripts.register_model"]
    volumes:
      - mlflow-data:/mlflow
    env_file:
      - ../document-management-processor/.env
    depends_on:
      mlflow:
        condition: service_started
    networks:
      - dms-network
    profiles:
      - tools

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: dms-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - dms-network

  grafana:
    image: grafana/grafana:11.6.0
    container_name: dms-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - dms-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: dms-mlflow
    restart: unless-stopped
    ports:
      - "5001:5001"
    command:
      [
        "mlflow",
        "server",
        "--host",
        "0.0.0.0",
        "--port",
        "5001",
        "--backend-store-uri",
        "sqlite:///mlflow/mlflow.db",
        "--default-artifact-root",
        "/mlflow/artifacts",
      ]
    volumes:
      - mlflow-data:/mlflow
    networks:
      - dms-network

volumes:
  postgres-data:
  rabbitmq-data:
  elasticsearch-data:
  hf-cache:
  easyocr-cache:
  prometheus-data:
  grafana-data:
  mlflow-data:

networks:
  dms-network:
